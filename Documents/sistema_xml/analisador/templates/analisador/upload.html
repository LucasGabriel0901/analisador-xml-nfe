<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Notas Fiscais</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 1. Fonte customizada (Exemplo: Roboto, mais limpa e moderna) */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        body {
            /* Fundo Escuro para o tema */
            background-color: #212529; /* Cor de fundo Dark Mode (quase preto) */
            color: #f8f9fa; /* Cor do texto branco claro */
            font-family: 'Roboto', sans-serif; /* Aplica a nova fonte */
        }
        
        /* O "Card" do formulário */
        .upload-card {
            max-width: 500px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5); /* Sombra mais forte para destaque no fundo escuro */
            background-color: #343a40; /* Fundo do card cinza escuro */
            border: 1px solid #495057; /* Borda sutil */
        }

        /* Cor do título no modo escuro */
        .text-primary {
            color: #4dc4ff !important; /* Um azul mais vibrante para contraste */
        }
        
        /* Cor da label do formulário */
        .form-label {
            color: #dee2e6;
        }

    </style>

</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12 d-flex justify-content-center">
                <div class="upload-card">
                    
                    <h2 class="mb-4 text-center text-primary">Analisador de Notas Fiscais XML</h2>

                    <form method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="xml_file" class="form-label">Selecione o arquivo XML NFe:</label>
                            <input type="file" name="xml_file" id="xml_file" accept=".xml" class="form-control bg-secondary text-light" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                Processar e Analisar
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
